<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>人脸识别系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  main { max-width: 960px; margin: 2rem auto; }
  .tab-active { font-weight: bold; border-bottom: 2px solid var(--pico-primary); }
  .video-container { position: relative; width: 640px; max-width: 100%; margin: 0 auto; background: #000; border-radius: 4px; overflow: hidden; }
  canvas { display: block; width: 100%; height: auto; }
  .toast { position: fixed; top: 1rem; right: 1rem; padding: .75rem 1.25rem; border-radius: 6px; min-width: 240px; max-width: 400px; z-index: 9999; transition: opacity .3s; font-size: .9rem; }
  .toast.success { background: #198754; color: #fff; }
  .toast.error   { background: #dc3545; color: #fff; }
  .toast.hidden  { opacity: 0; pointer-events: none; }
  .stream-controls { display: flex; gap: .5rem; margin: .5rem 0 1rem; }
  .identity-unknown { color: var(--pico-del-color); font-style: italic; }
  .identity-known   { color: var(--pico-ins-color); font-weight: 600; }
</style>
</head>
<body>
<main>
  <nav>
    <ul><li><strong>🔍 人脸识别系统</strong></li></ul>
    <ul>
      <li><a href="#" id="tab-persons" class="tab-active">人员管理</a></li>
      <li><a href="#" id="tab-stream">实时识别</a></li>
    </ul>
  </nav>

  <!-- Tab 1: 人员管理 -->
  <section id="page-persons">
    <article>
      <h3>注册新人</h3>
      <form id="register-form">
        <label>ID（英文/数字/下划线，唯一）<input type="text" name="person_id" required minlength="1" maxlength="64" pattern="[a-zA-Z0-9_\-]+"></label>
        <label>姓名<input type="text" name="display_name" required minlength="1" maxlength="64"></label>
        <label>模板策略
          <select name="strategy">
            <option value="random_one">随机 1 张</option>
            <option value="mean_all">均值（全部）</option>
            <option value="manual_three">人工挑 3 张</option>
            <option value="kmeans_k3" selected>KMeans K=3</option>
            <option value="all_vectors">全量向量</option>
          </select>
        </label>
        <label>照片（可多选）<input type="file" name="images" accept="image/*" multiple required></label>
        <button type="submit">注册</button>
      </form>
    </article>

    <article>
      <h3>已注册人员</h3>
      <div class="overflow-auto">
        <table>
          <thead><tr><th>ID</th><th>姓名</th><th>模板数</th><th>操作</th></tr></thead>
          <tbody id="persons-tbody"></tbody>
        </table>
      </div>
    </article>
  </section>

  <!-- Tab 2: 实时识别 -->
  <section id="page-stream" hidden>
    <h3>实时画面</h3>
    <div class="video-container"><canvas id="video-canvas" width="640" height="480"></canvas></div>
    <div class="stream-controls">
      <button id="btn-start-stream">开始</button>
      <button id="btn-stop-stream" disabled>停止</button>
    </div>
    <article>
      <h3>识别结果</h3>
      <table>
        <thead><tr><th>Track</th><th>身份</th><th>相似度</th></tr></thead>
        <tbody id="tracks-tbody"></tbody>
      </table>
    </article>
  </section>
</main>

<div id="toast" class="toast hidden"></div>

<script>
"use strict";

// ===== 工具函数 =====
const toastEl = document.getElementById("toast");
let toastTimer;
function showToast(message, type = "success", duration = 3000) {
  toastEl.textContent = message;
  toastEl.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.add("hidden"), duration);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

async function apiFetch(path, options = {}) {
  const resp = await fetch(path, options);
  if (!resp.ok) {
    let detail = `HTTP ${resp.status}`;
    try { const body = await resp.json(); detail = body.detail || detail; } catch (_) {}
    throw new Error(detail);
  }
  if (resp.status === 204) return null;
  return resp.json();
}

// ===== Tab 切换 =====
const tabPersons = document.getElementById("tab-persons");
const tabStream  = document.getElementById("tab-stream");
const pagePersons = document.getElementById("page-persons");
const pageStream  = document.getElementById("page-stream");

function switchTab(active) {
  if (active === "persons") {
    pagePersons.hidden = false; pageStream.hidden = true;
    tabPersons.classList.add("tab-active"); tabStream.classList.remove("tab-active");
    loadPersons();
  } else {
    pagePersons.hidden = true; pageStream.hidden = false;
    tabStream.classList.add("tab-active"); tabPersons.classList.remove("tab-active");
  }
}
tabPersons.addEventListener("click", e => { e.preventDefault(); switchTab("persons"); });
tabStream .addEventListener("click", e => { e.preventDefault(); switchTab("stream");  });

// ===== 人员管理 =====
const personsTbody = document.getElementById("persons-tbody");
const registerForm = document.getElementById("register-form");

async function loadPersons() {
  try {
    const persons = await apiFetch("/api/persons");
    personsTbody.innerHTML = "";
    if (!persons.length) {
      personsTbody.innerHTML = `<tr><td colspan="4"><em>暂无人员</em></td></tr>`;
      return;
    }
    for (const p of persons) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><code>${escapeHtml(p.person_id)}</code></td>
        <td>${escapeHtml(p.display_name)}</td>
        <td>${p.template_count}</td>
        <td><button class="outline secondary" data-action="delete" data-id="${escapeHtml(p.person_id)}">删除</button></td>
      `;
      personsTbody.appendChild(tr);
    }
  } catch (err) {
    showToast(`加载失败: ${err.message}`, "error");
  }
}

registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(registerForm);
  const btn = registerForm.querySelector("button[type=submit]");
  btn.setAttribute("aria-busy", "true"); btn.disabled = true;
  try {
    const result = await apiFetch("/api/persons", { method: "POST", body: formData });
    showToast(`注册成功: ${result.display_name} (${result.template_count} 模板)`, "success");
    registerForm.reset();
    loadPersons();
  } catch (err) {
    showToast(`注册失败: ${err.message}`, "error");
  } finally {
    btn.removeAttribute("aria-busy"); btn.disabled = false;
  }
});

// 事件代理：删除
personsTbody.addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-action=delete]");
  if (!btn) return;
  const id = btn.dataset.id;
  if (!confirm(`确定删除 ${id} 吗？此操作不可撤销。`)) return;
  btn.setAttribute("aria-busy", "true"); btn.disabled = true;
  try {
    await apiFetch(`/api/persons/${encodeURIComponent(id)}`, { method: "DELETE" });
    showToast(`已删除: ${id}`, "success");
    loadPersons();
  } catch (err) {
    showToast(`删除失败: ${err.message}`, "error");
    btn.removeAttribute("aria-busy"); btn.disabled = false;
  }
});

// ===== 实时识别 WebSocket =====
const canvas = document.getElementById("video-canvas");
const ctx = canvas.getContext("2d");
const btnStart = document.getElementById("btn-start-stream");
const btnStop  = document.getElementById("btn-stop-stream");
const tracksTbody = document.getElementById("tracks-tbody");

let ws = null;

function startStream() {
  if (ws) return;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws/stream`);
  ws.binaryType = "blob";

  ws.onopen = () => {
    showToast("已连接，识别中...", "success");
    btnStart.disabled = true; btnStop.disabled = false;
  };

  ws.onmessage = async (event) => {
    if (event.data instanceof Blob) {
      // 二进制 JPEG 帧
      const bitmap = await createImageBitmap(event.data);
      if (canvas.width !== bitmap.width || canvas.height !== bitmap.height) {
        canvas.width = bitmap.width; canvas.height = bitmap.height;
      }
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
    } else {
      // JSON 元数据
      let meta;
      try { meta = JSON.parse(event.data); } catch (_) { return; }
      if (meta.error) { showToast(`服务端错误: ${meta.error}`, "error"); stopStream(); return; }
      renderTracks(meta.tracks || []);
    }
  };

  ws.onerror = () => showToast("WebSocket 连接错误", "error");
  ws.onclose = () => { ws = null; btnStart.disabled = false; btnStop.disabled = true; };
}

function stopStream() { if (ws) ws.close(); }

function renderTracks(tracks) {
  tracksTbody.innerHTML = "";
  if (!tracks.length) {
    tracksTbody.innerHTML = `<tr><td colspan="3"><em>未检测到人脸</em></td></tr>`;
    return;
  }
  for (const t of tracks) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${t.track_id}</td>
      <td><span class="${t.identity ? 'identity-known' : 'identity-unknown'}">${t.identity ? escapeHtml(t.identity) : '未知'}</span></td>
      <td>${t.similarity.toFixed(3)}</td>
    `;
    tracksTbody.appendChild(tr);
  }
}

btnStart.addEventListener("click", startStream);
btnStop .addEventListener("click", stopStream);

// 首屏加载
loadPersons();
</script>
</body>
</html>
